name: 価格モニター

# 定期実行 + 手動実行。スケジュールは「デフォルトブランチ」のものだけが
# 動く点に注意（このワークフローを master にマージすると自動巡回が始まります）。
on:
  schedule:
    # UTC。6時間ごと（日本時間 0,6,12,18時頃）。間隔を変えたい場合はここを編集。
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "特定の商品 id だけチェック（空なら全部）"
        required: false
        default: ""

# 同時実行を防ぐ（履歴コミットの競合回避）
concurrency:
  group: price-monitor
  cancel-in-progress: false

permissions:
  contents: write   # 価格履歴をリポジトリにコミットするため
  pages: write      # GitHub Pages へデプロイするため
  id-token: write   # Pages デプロイの認証

jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: price-monitor
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: price-monitor/requirements.txt

      - name: 依存関係のインストール
        run: pip install -r requirements.txt

      - name: 価格チェック
        env:
          # GitHub の Settings > Secrets and variables > Actions に登録した値が入ります。
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "${{ github.event.inputs.only }}" ]; then
            python monitor.py --only "${{ github.event.inputs.only }}"
          else
            python monitor.py
          fi

      - name: 価格履歴をコミット
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "変更なし"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(price-monitor): update price history [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-pages:
    needs: monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}   # monitor がコミットした最新を取得

      - name: サイトを組み立て（ダッシュボード + データ）
        run: |
          mkdir -p _site
          cp -r price-monitor/docs/* _site/
          mkdir -p _site/data
          cp -r price-monitor/data/* _site/data/ 2>/dev/null || true

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
