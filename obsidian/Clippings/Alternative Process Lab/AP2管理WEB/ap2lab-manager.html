<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ap2lab 社内管理（叩き台）</title>
<style>
  :root{
    --bg:#0e1116; --card:#171c24; --card2:#1f2630; --line:#2a3340;
    --text:#e7edf5; --sub:#9aa7b8; --accent:#3b82f6; --accent2:#22c55e;
    --warn:#f59e0b; --danger:#ef4444; --purple:#8b5cf6;
    --radius:16px; --headerH:58px; --sideW:220px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;}
  .app{min-height:100vh;display:flex;flex-direction:column}
  /* top bar */
  .topbar{height:var(--headerH);padding:0 18px;display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(180deg,#141a22,#0e1116);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:40}
  .brand{font-weight:800;letter-spacing:.5px;font-size:17px;line-height:1.1}
  .brand small{color:var(--sub);font-weight:600;font-size:11px;display:block;letter-spacing:1px}
  .who{display:flex;align-items:center;gap:8px;font-size:12px}
  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
    font-weight:700;font-size:13px;color:#fff;background:var(--accent)}
  .role-pill{font-size:10px;color:var(--sub)}
  .switch-btn{font-size:11px;color:var(--accent);background:none;border:1px solid var(--line);
    padding:5px 10px;border-radius:999px;cursor:pointer}
  .body{flex:1;display:flex;min-height:0}
  /* nav */
  .nav{display:flex}
  .nav button{background:none;border:none;color:var(--sub);cursor:pointer;display:flex;align-items:center}
  .nav button .ic{line-height:1}
  .nav button.active{color:var(--accent)}
  /* content */
  .content{flex:1;overflow-y:auto;padding:16px}
  .screen{display:none;animation:fade .25s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.sec{font-size:13px;color:var(--sub);margin:18px 4px 10px;letter-spacing:.5px;text-transform:uppercase}
  /* cards / kpi */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .kpi{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);
    border-radius:var(--radius);padding:16px}
  .kpi .label{font-size:11px;color:var(--sub)}
  .kpi .val{font-size:24px;font-weight:800;margin-top:6px}
  .kpi .delta{font-size:11px;margin-top:4px}
  .up{color:var(--accent2)} .down{color:var(--danger)}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px}
  .b-paid{background:rgba(34,197,94,.15);color:#4ade80}
  .b-unpaid{background:rgba(245,158,11,.15);color:#fbbf24}
  .b-web{background:rgba(59,130,246,.15);color:#60a5fa}
  .b-store{background:rgba(148,163,184,.15);color:#cbd5e1}
  .b-done{background:rgba(34,197,94,.15);color:#4ade80}
  .b-doing{background:rgba(59,130,246,.15);color:#60a5fa}
  .b-todo{background:rgba(148,163,184,.15);color:#cbd5e1}
  .item{padding:13px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item .t{font-weight:700;font-size:15px}
  .item .m{color:var(--sub);font-size:12px;margin-top:3px}
  .pbar{height:7px;border-radius:999px;background:#26303c;overflow:hidden;margin-top:9px}
  .pbar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#3b82f6,#22c55e)}
  .tag{display:inline-block;font-size:11px;color:var(--sub);background:#222b36;padding:3px 9px;border-radius:8px;margin:2px 4px 2px 0}
  .lock{margin-top:8px;padding:14px;border:1px dashed var(--line);border-radius:12px;color:var(--sub);font-size:12px;text-align:center;background:#12161d}
  .avatar-sm{width:24px;height:24px;border-radius:50%;display:inline-grid;place-items:center;font-size:10px;font-weight:700;color:#fff;background:#475569}
  .sq{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#cbd5e1;background:#11161d;border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .sq b{color:#fff}

  /* ===== Calendar ===== */
  .cal-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:12px 0}
  .cal-nav{display:flex;align-items:center;gap:6px}
  .cal-nav button{background:var(--card2);border:1px solid var(--line);color:var(--text);width:34px;height:34px;
    border-radius:9px;cursor:pointer;font-size:16px;display:grid;place-items:center}
  .cal-today{width:auto!important;padding:0 12px;font-size:13px!important;font-weight:700}
  .cal-title{font-size:18px;font-weight:800;min-width:130px}
  .seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--sub);padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff}
  /* month */
  .mhead{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
  .mhead div{text-align:center;font-size:11px;color:var(--sub);padding:2px 0}
  .mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .mcell{min-height:92px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:5px;cursor:pointer;overflow:hidden;transition:.12s}
  .mcell:hover{border-color:var(--accent)}
  .mcell.out{opacity:.35}
  .mcell .dn{font-size:12px;font-weight:700;margin-bottom:3px}
  .mcell.today .dn{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:grid;place-items:center}
  .sun{color:#f87171} .sat{color:#60a5fa}
  .chip{font-size:10px;padding:2px 5px;border-radius:5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    background:rgba(59,130,246,.18);border-left:3px solid var(--accent);cursor:pointer}
  .chip.paid{border-left-color:var(--accent2)} .chip.unpaid{border-left-color:var(--warn)}
  .chip.task{background:rgba(139,92,246,.18);border-left-color:var(--purple)}
  .more{font-size:10px;color:var(--sub);padding-left:3px}
  /* time grid (week / 3day) */
  .tg-wrap{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
  .tg-head{display:grid;border-bottom:1px solid var(--line)}
  .tg-head .dh{text-align:center;padding:8px 2px;border-left:1px solid var(--line)}
  .tg-head .dh .wd{font-size:11px;color:var(--sub)}
  .tg-head .dh .dd{font-size:16px;font-weight:800}
  .tg-head .dh.today .dd{color:var(--accent)}
  .tg-body{max-height:60vh;overflow-y:auto;position:relative}
  .tg-grid{display:grid;position:relative}
  .tg-gutter{position:relative}
  .tg-gutter .hl{height:46px;font-size:10px;color:var(--sub);text-align:right;padding-right:6px;transform:translateY(-6px)}
  .tg-col{position:relative;border-left:1px solid var(--line);
    background-image:repeating-linear-gradient(to bottom,var(--line) 0,var(--line) 1px,transparent 1px,transparent 46px)}
  .ev{position:absolute;left:3px;right:3px;border-radius:7px;padding:4px 6px;font-size:11px;overflow:hidden;cursor:pointer;
    background:rgba(59,130,246,.85);color:#fff;border-left:3px solid #1d4ed8}
  .ev.paid{background:rgba(34,197,94,.82);border-left-color:#15803d}
  .ev.unpaid{background:rgba(245,158,11,.85);border-left-color:#b45309}
  .ev.task{background:rgba(139,92,246,.85);border-left-color:#6d28d9}
  .ev .et{font-weight:700;line-height:1.2}
  .ev .es{opacity:.9;font-size:10px}

  /* holidays */
  .mcell .hol{font-size:9px;color:#d93025;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dn.hol-day{color:#d93025!important}
  .tg-head .dh.hol .dd{color:#d93025}
  .tg-allday{display:grid;border-bottom:1px solid var(--line);min-height:24px}
  .tg-allday .ad-label{font-size:9px;color:var(--sub);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
  .tg-allday .ad-cell{border-left:1px solid var(--line);padding:3px}
  .ad-hol{font-size:10px;color:#fff;background:#d93025;border-radius:5px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
  .nowline{position:absolute;left:0;right:0;height:2px;background:#ea4335;z-index:5}
  .nowline::before{content:"";position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#ea4335}

  /* ===== Light theme (Googleカレンダー風) ===== */
  body.light{--bg:#f1f3f4;--card:#ffffff;--card2:#f1f3f4;--line:#dadce0;--text:#202124;--sub:#5f6368;
    --accent:#1a73e8;--accent2:#188038;--warn:#e8710a;--danger:#d93025;--purple:#8430ce}
  body.light .topbar{background:#fff;color:#202124}
  body.light .nav{background:#fff}
  body.light .b-paid,body.light .b-done{color:#188038}
  body.light .b-unpaid{color:#b06000}
  body.light .b-web,body.light .b-doing{color:#1967d2}
  body.light .b-store,body.light .b-todo{color:#5f6368}
  body.light .pbar{background:#e6e8eb}
  body.light .tag{background:#f1f3f4}
  body.light .avatar-sm{background:#9aa0a6}

  /* overlay / modal */
  .overlay{position:fixed;inset:0;background:rgba(5,8,12,.86);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .overlay.show{display:flex}
  .overlay .box{max-width:420px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px;max-height:88vh;overflow-y:auto}
  .overlay h3{margin:0 0 4px;font-size:18px}
  .overlay p.lead{color:var(--sub);font-size:12px;margin:0 0 18px}
  .role-btn{width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.15s}
  .role-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .role-btn .d{font-size:11px;color:var(--sub);margin-top:2px}
  .note{font-size:11px;color:var(--sub);line-height:1.6;background:#10151c;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:14px}
  .dl{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
  .dl:last-child{border-bottom:none}
  .dl .k{color:var(--sub)}
  .dl .v{font-weight:700;text-align:right}
  .closeb{margin-top:16px;width:100%;background:var(--card2);border:1px solid var(--line);color:var(--text);padding:12px;border-radius:12px;font-weight:700;cursor:pointer}

  /* ===== Responsive: mobile (default) ===== */
  .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(20,26,34,.96);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);justify-content:space-around;padding:8px 4px 14px;z-index:30}
  .nav button{flex-direction:column;gap:3px;font-size:10px;flex:1;padding:4px}
  .nav button .ic{font-size:20px}
  .content{padding-bottom:90px}

  /* ===== Responsive: desktop ===== */
  @media (min-width:900px){
    .nav{position:sticky;top:var(--headerH);align-self:flex-start;height:calc(100vh - var(--headerH));
      width:var(--sideW);flex-direction:column;justify-content:flex-start;gap:4px;padding:16px 10px;
      border-top:none;border-right:1px solid var(--line);background:#10151c;backdrop-filter:none}
    .nav button{flex:none;width:100%;flex-direction:row;justify-content:flex-start;gap:12px;font-size:14px;
      padding:11px 14px;border-radius:10px}
    .nav button.active{background:rgba(59,130,246,.12)}
    .nav button .ic{font-size:18px;width:22px;text-align:center}
    .content{padding:24px 28px 40px;max-width:1120px;margin:0 auto;width:100%}
    .mcell{min-height:110px}
    .tg-body{max-height:64vh}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">Ap2lab<small>暗室ルーム 社内管理</small></div>
    <div class="who">
      <div style="text-align:right">
        <div id="whoName" style="font-weight:700">—</div>
        <div class="role-pill" id="whoRole">—</div>
      </div>
      <div class="avatar" id="whoAv">A</div>
      <button class="switch-btn" id="themeBtn" onclick="toggleTheme()" title="テーマ切替">🌙</button>
      <button class="switch-btn" onclick="openLogin()">切替</button>
    </div>
  </header>

  <div class="body">
    <nav class="nav" id="nav">
      <button data-screen="s-home" class="active" onclick="go('s-home',this)"><span class="ic">🏠</span><span>ホーム</span></button>
      <button data-screen="s-book" onclick="go('s-book',this)"><span class="ic">📅</span><span>カレンダー</span></button>
      <button data-screen="s-task" onclick="go('s-task',this)"><span class="ic">✅</span><span>作業</span></button>
      <button data-screen="s-cust" onclick="go('s-cust',this)"><span class="ic">👥</span><span>顧客</span></button>
      <button data-screen="s-biz" onclick="go('s-biz',this)"><span class="ic">📊</span><span>経営</span></button>
    </nav>

    <main class="content">
      <!-- HOME -->
      <section class="screen active" id="s-home">
        <h2 class="sec">今日の状況</h2>
        <div class="kpi-grid" id="homeKpi"></div>
        <h2 class="sec">本日の予約</h2>
        <div class="card" id="homeBookings"></div>
        <h2 class="sec">あなたのタスク</h2>
        <div class="card" id="homeTasks"></div>
      </section>

      <!-- CALENDAR -->
      <section class="screen" id="s-book">
        <div class="sq">🟦 <span><b>Square予約</b> と連携：部屋料金は予約時に事前決済／店頭受付分は当日精算</span></div>
        <div class="cal-bar">
          <div class="cal-nav">
            <button onclick="calToday()" class="cal-today">今日</button>
            <button onclick="calMove(-1)">‹</button>
            <button onclick="calMove(1)">›</button>
            <span class="cal-title" id="calTitle"></span>
          </div>
          <div class="seg" id="calSeg">
            <button data-v="month" onclick="setView('month')">月</button>
            <button data-v="week" onclick="setView('week')">週</button>
            <button data-v="3day" onclick="setView('3day')">3日</button>
          </div>
        </div>
        <div id="calBody"></div>
      </section>

      <!-- TASK -->
      <section class="screen" id="s-task">
        <h2 class="sec">作業・進捗</h2>
        <div class="card" id="taskList"></div>
      </section>

      <!-- CUSTOMERS -->
      <section class="screen" id="s-cust">
        <h2 class="sec">顧客リスト</h2>
        <div class="card" id="custList"></div>
      </section>

      <!-- BIZ -->
      <section class="screen" id="s-biz">
        <h2 class="sec">経営ダッシュボード</h2>
        <div id="bizBody"></div>
      </section>
    </main>
  </div>
</div>

<!-- LOGIN -->
<div class="overlay show" id="login">
  <div class="box">
    <h3>ログイン</h3>
    <p class="lead">※叩き台では「誰としてログインするか」を選ぶと、その人に見える画面だけが表示されます（＝権限分けの体感）。</p>
    <button class="role-btn" onclick="login('owner')"><span class="avatar" style="background:#8b5cf6">大</span><div><div style="font-weight:700">あなた（オーナー）</div><div class="d">全権限・経営数値まで全部</div></div></button>
    <button class="role-btn" onclick="login('admin')"><span class="avatar" style="background:#3b82f6">経</span><div><div style="font-weight:700">経営パートナー（管理者）</div><div class="d">全権限・経営も把握</div></div></button>
    <button class="role-btn" onclick="login('reception')"><span class="avatar" style="background:#22c55e">予</span><div><div style="font-weight:700">予約・顧客担当</div><div class="d">予約／顧客対応／カレンダー（経営数値は非表示）</div></div></button>
    <button class="role-btn" onclick="login('worker')"><span class="avatar" style="background:#f59e0b">作</span><div><div style="font-weight:700">作業担当</div><div class="d">割当作業と進捗・自分の予定のみ</div></div></button>
    <div class="note">これはGlideで作った場合の<b>完成イメージの再現</b>です。本番では本物のログインと、ここで見た権限分けがそのまま使えます。</div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail" onclick="if(event.target===this)closeDetail()">
  <div class="box" id="detailBox"></div>
</div>

<script>
/* ---------- マスタ ---------- */
const USERS={
  owner:{name:"あなた",role:"オーナー",av:"大",col:"#8b5cf6"},
  admin:{name:"経営パートナー",role:"管理者",av:"経",col:"#3b82f6"},
  reception:{name:"予約担当",role:"予約・顧客担当",av:"予",col:"#22c55e"},
  worker:{name:"作業担当",role:"作業担当",av:"作",col:"#f59e0b"},
};
const PERMS={
  owner:["s-home","s-book","s-task","s-cust","s-biz"],
  admin:["s-home","s-book","s-task","s-cust","s-biz"],
  reception:["s-home","s-book","s-task","s-cust"],
  worker:["s-home","s-book","s-task"],
};
const WD=["日","月","火","水","木","金","土"];

/* 日本の祝祭日（2025〜2027・振替休日/国民の休日を含む。内蔵のためオフラインでも動作） */
const HOLIDAYS={
  "2025-01-01":"元日","2025-01-13":"成人の日","2025-02-11":"建国記念の日","2025-02-23":"天皇誕生日","2025-02-24":"振替休日",
  "2025-03-20":"春分の日","2025-04-29":"昭和の日","2025-05-03":"憲法記念日","2025-05-04":"みどりの日","2025-05-05":"こどもの日","2025-05-06":"振替休日",
  "2025-07-21":"海の日","2025-08-11":"山の日","2025-09-15":"敬老の日","2025-09-23":"秋分の日","2025-10-13":"スポーツの日",
  "2025-11-03":"文化の日","2025-11-23":"勤労感謝の日","2025-11-24":"振替休日",
  "2026-01-01":"元日","2026-01-12":"成人の日","2026-02-11":"建国記念の日","2026-02-23":"天皇誕生日","2026-03-20":"春分の日",
  "2026-04-29":"昭和の日","2026-05-03":"憲法記念日","2026-05-04":"みどりの日","2026-05-05":"こどもの日","2026-05-06":"振替休日",
  "2026-07-20":"海の日","2026-08-11":"山の日","2026-09-21":"敬老の日","2026-09-22":"国民の休日","2026-09-23":"秋分の日","2026-10-12":"スポーツの日",
  "2026-11-03":"文化の日","2026-11-23":"勤労感謝の日",
  "2027-01-01":"元日","2027-01-11":"成人の日","2027-02-11":"建国記念の日","2027-02-23":"天皇誕生日","2027-03-21":"春分の日","2027-03-22":"振替休日",
  "2027-04-29":"昭和の日","2027-05-03":"憲法記念日","2027-05-04":"みどりの日","2027-05-05":"こどもの日",
  "2027-07-19":"海の日","2027-08-11":"山の日","2027-09-20":"敬老の日","2027-09-23":"秋分の日","2027-10-11":"スポーツの日",
  "2027-11-03":"文化の日","2027-11-23":"勤労感謝の日",
};
function holidayName(d){const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");return HOLIDAYS[k]||null;}

/* 予約（day=今日からのオフセット, sh/eh=開始終了の小数時） */
const BOOKINGS=[
  {day:0,sh:10,eh:12,room:"暗室A",cust:"田中 様",amount:3000,pay:"paid",ch:"web"},
  {day:0,sh:13,eh:15,room:"暗室B",cust:"佐藤 様",amount:3000,pay:"paid",ch:"web"},
  {day:0,sh:15.5,eh:17.5,room:"スタジオ",cust:"鈴木 様",amount:5000,pay:"unpaid",ch:"store"},
  {day:0,sh:18,eh:20,room:"暗室A",cust:"山本 様",amount:3000,pay:"paid",ch:"web"},
  {day:1,sh:11,eh:13,room:"暗室A",cust:"伊藤 様",amount:3000,pay:"paid",ch:"web"},
  {day:1,sh:14,eh:16,room:"暗室B",cust:"渡辺 様",amount:3000,pay:"unpaid",ch:"store"},
  {day:2,sh:13,eh:15,room:"スタジオ",cust:"高橋 様",amount:5000,pay:"paid",ch:"web"},
  {day:3,sh:10,eh:12,room:"暗室B",cust:"中村 様",amount:3000,pay:"paid",ch:"web"},
  {day:-2,sh:10,eh:12,room:"暗室A",cust:"小林 様",amount:3000,pay:"paid",ch:"web"},
  {day:-5,sh:15,eh:17,room:"スタジオ",cust:"加藤 様",amount:5000,pay:"paid",ch:"web"},
  {day:6,sh:10,eh:12,room:"暗室A",cust:"吉田 様",amount:3000,pay:"paid",ch:"web"},
  {day:8,sh:13,eh:15,room:"暗室B",cust:"山田 様",amount:3000,pay:"unpaid",ch:"store"},
  {day:12,sh:11,eh:13,room:"スタジオ",cust:"佐々木 様",amount:5000,pay:"paid",ch:"web"},
];
/* タスク（カレンダーにも表示） */
const TASKS=[
  {t:"暗室Aの薬品補充・廃液処理",who:"作",prog:100,st:"done",room:"暗室A",day:0,sh:9,eh:10},
  {t:"引き伸ばし機の点検（暗室B）",who:"作",prog:60,st:"doing",room:"暗室B",day:1,sh:9,eh:10.5},
  {t:"スタジオ照明の電球交換",who:"作",prog:0,st:"todo",room:"スタジオ",day:2,sh:17,eh:18},
  {t:"備品（印画紙）発注",who:"予",prog:30,st:"doing",room:"—",day:0,sh:16,eh:16.5},
];
const CUSTOMERS=[
  {n:"田中 様",tel:"090-xxxx-1234",visits:12,note:"モノクロ中心・常連"},
  {n:"佐藤 様",tel:"090-xxxx-5678",visits:5,note:"大判プリント希望"},
  {n:"鈴木 様",tel:"080-xxxx-9012",visits:1,note:"初回・店頭予約"},
  {n:"山本 様",tel:"070-xxxx-3456",visits:8,note:"夜間利用が多い"},
];

/* ---------- 状態 ---------- */
let current="owner";
let calView="month";
const today=new Date(); today.setHours(0,0,0,0);
let calAnchor=new Date(today);
const SH=8, EH=22, HH=46; // タイムグリッド: 8時〜22時, 1時間=46px

/* イベント正規化（id付与） */
let EVENTS=[];
function buildEvents(){
  EVENTS=[];
  BOOKINGS.forEach((b,i)=>EVENTS.push({id:"b"+i,type:"booking",date:dateOf(b.day),sh:b.sh,eh:b.eh,
    room:b.room,cust:b.cust,amount:b.amount,pay:b.pay,ch:b.ch}));
  TASKS.forEach((t,i)=>EVENTS.push({id:"t"+i,type:"task",date:dateOf(t.day),sh:t.sh,eh:t.eh,
    title:t.t,who:t.who,prog:t.prog,st:t.st,room:t.room}));
}
function eventsForRole(){
  if(current==="worker") return EVENTS.filter(e=>e.type==="task"&&e.who==="作");
  if(current==="reception") return EVENTS.filter(e=>e.type==="booking"||e.who==="予");
  return EVENTS; // owner/admin
}
function eventById(id){return EVENTS.find(e=>e.id===id);}

/* ---------- ユーティリティ ---------- */
function yen(n){return "¥"+n.toLocaleString()}
function dateOf(off){const x=new Date(today);x.setDate(x.getDate()+off);return x;}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function fmtH(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0");}
function startOfWeek(d){const x=new Date(d);x.setDate(x.getDate()-x.getDay());x.setHours(0,0,0,0);return x;}

/* ---------- 共通描画 ---------- */
function render(){
  const u=USERS[current];
  whoName.textContent=u.name; whoRole.textContent=u.role; whoAv.textContent=u.av; whoAv.style.background=u.col;
  document.querySelectorAll('#nav button').forEach(b=>{b.style.display=PERMS[current].includes(b.dataset.screen)?'flex':'none';});

  /* HOME */
  const todays=BOOKINGS.filter(b=>b.day===0);
  const paidToday=todays.filter(b=>b.pay==="paid").reduce((s,b)=>s+b.amount,0);
  let kpi="";
  if(current==="owner"||current==="admin"){
    kpi=`<div class="kpi"><div class="label">本日売上(事前決済)</div><div class="val">${yen(paidToday)}</div><div class="delta up">▲ 前週比 +12%</div></div>
         <div class="kpi"><div class="label">本日予約</div><div class="val">${todays.length}件</div><div class="delta">部屋稼働 72%</div></div>`;
  }else if(current==="reception"){
    kpi=`<div class="kpi"><div class="label">本日予約</div><div class="val">${todays.length}件</div><div class="delta">店頭精算 ${todays.filter(b=>b.pay==='unpaid').length}件</div></div>
         <div class="kpi"><div class="label">未精算</div><div class="val">${todays.filter(b=>b.pay==='unpaid').length}件</div><div class="delta down">当日要確認</div></div>`;
  }else{
    const mine=TASKS.filter(t=>t.who==="作");
    kpi=`<div class="kpi"><div class="label">あなたの作業</div><div class="val">${mine.length}件</div><div class="delta">未完 ${mine.filter(t=>t.st!=='done').length}件</div></div>
         <div class="kpi"><div class="label">本日完了</div><div class="val">${mine.filter(t=>t.st==='done').length}件</div><div class="delta up">お疲れさまです</div></div>`;
  }
  homeKpi.innerHTML=kpi;
  homeBookings.innerHTML = current==="worker"
    ? `<div class="lock">🔒 予約・顧客情報は作業担当には表示されません</div>`
    : todays.map(bookingRow).join("");
  const myTasks=current==="worker"?TASKS.filter(t=>t.who==="作"):TASKS;
  homeTasks.innerHTML=myTasks.slice(0,3).map(taskRow).join("");

  /* TASK */
  taskList.innerHTML=myTasks.map(taskRow).join("");

  /* CUSTOMERS */
  if(["owner","admin","reception"].includes(current)){
    custList.innerHTML=CUSTOMERS.map(c=>`<div class="item"><div class="row"><div class="t">${c.n}</div><span class="tag">来店 ${c.visits}回</span></div><div class="m">📞 ${c.tel}</div><div class="m">📝 ${c.note}</div></div>`).join("");
  }

  renderBiz();
  renderCalendar();
}

function bookingRow(b){
  const payBadge=b.pay==="paid"?`<span class="badge b-paid">決済済</span>`:`<span class="badge b-unpaid">店頭精算</span>`;
  const chBadge=b.ch==="web"?`<span class="badge b-web">Web予約</span>`:`<span class="badge b-store">店頭受付</span>`;
  return `<div class="item"><div class="row"><div class="t">${fmtH(b.sh)}–${fmtH(b.eh)}　${b.room}</div>${payBadge}</div>
    <div class="row" style="margin-top:6px"><div class="m">👤 ${b.cust}　${chBadge}</div><div style="font-weight:700">${yen(b.amount)}</div></div></div>`;
}
function taskRow(t){
  const st=t.st==="done"?`<span class="badge b-done">完了</span>`:t.st==="doing"?`<span class="badge b-doing">進行中</span>`:`<span class="badge b-todo">未着手</span>`;
  return `<div class="item"><div class="row"><div class="t">${t.t}</div>${st}</div>
    <div class="m"><span class="avatar-sm">${t.who}</span> 担当　／　対象：${t.room}</div>
    <div class="pbar"><i style="width:${t.prog}%"></i></div></div>`;
}
function renderBiz(){
  if(!["owner","admin"].includes(current)){bizBody.innerHTML=`<div class="lock">🔒 経営ダッシュボードはオーナー・管理者のみ閲覧できます</div>`;return;}
  const monthSales=486000;
  const roomShare=[["暗室A",42],["暗室B",33],["スタジオ",25]];
  bizBody.innerHTML=`<div class="kpi-grid">
     <div class="kpi"><div class="label">今月売上</div><div class="val">${yen(monthSales)}</div><div class="delta up">▲ 前月比 +12%</div></div>
     <div class="kpi"><div class="label">今月予約数</div><div class="val">128件</div><div class="delta up">▲ +9件</div></div>
     <div class="kpi"><div class="label">客単価</div><div class="val">${yen(Math.round(monthSales/128))}</div><div class="delta">—</div></div>
     <div class="kpi"><div class="label">リピート率</div><div class="val">64%</div><div class="delta up">▲ +5pt</div></div></div>
   <h2 class="sec">部屋別 稼働シェア</h2><div class="card">
     ${roomShare.map(r=>`<div class="item"><div class="row"><div class="t">${r[0]}</div><div style="font-weight:700">${r[1]}%</div></div><div class="pbar"><i style="width:${r[1]}%"></i></div></div>`).join("")}</div>
   <h2 class="sec">入金ステータス（Square）</h2><div class="card">
     <div class="item"><div class="row"><div class="t">事前決済（Web）</div><span class="badge b-paid">${yen(366000)}</span></div></div>
     <div class="item"><div class="row"><div class="t">店頭精算 予定</div><span class="badge b-unpaid">${yen(120000)}</span></div></div></div>`;
}

/* ---------- カレンダー ---------- */
function setView(v){calView=v;document.querySelectorAll('#calSeg button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));renderCalendar();}
function calToday(){calAnchor=new Date(today);renderCalendar();}
function calMove(dir){
  const x=new Date(calAnchor);
  if(calView==="month") x.setMonth(x.getMonth()+dir);
  else if(calView==="week") x.setDate(x.getDate()+7*dir);
  else x.setDate(x.getDate()+3*dir);
  calAnchor=x;renderCalendar();
}
function evClass(e){return e.type==="task"?"task":(e.pay==="paid"?"paid":"unpaid");}
function evLabel(e){return e.type==="task"?e.title:`${e.room}・${e.cust}`;}

function renderCalendar(){
  if(!PERMS[current].includes("s-book"))return;
  if(calView==="month")renderMonth();
  else renderTimeGrid(calView==="week"?7:3);
}
function renderMonth(){
  const y=calAnchor.getFullYear(), m=calAnchor.getMonth();
  calTitle.textContent=`${y}年${m+1}月`;
  const first=new Date(y,m,1), start=startOfWeek(first);
  const evs=eventsForRole();
  let html=`<div class="mhead">${WD.map((w,i)=>`<div class="${i===0?'sun':i===6?'sat':''}">${w}</div>`).join("")}</div><div class="mgrid">`;
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const out=d.getMonth()!==m, isToday=sameDay(d,today);
    const dayEvs=evs.filter(e=>sameDay(e.date,d)).sort((a,b)=>a.sh-b.sh);
    const hn=holidayName(d);
    const limit=hn?2:3;
    const chips=dayEvs.slice(0,limit).map(e=>`<div class="chip ${evClass(e)}" onclick="event.stopPropagation();openEvent('${e.id}')">${fmtH(e.sh)} ${evLabel(e)}</div>`).join("");
    const more=dayEvs.length>limit?`<div class="more">＋${dayEvs.length-limit}件</div>`:"";
    const dnCls=(hn||d.getDay()===0)?'sun hol-day':d.getDay()===6?'sat':'';
    const holLabel=hn?`<div class="hol">${hn}</div>`:"";
    const off=Math.round((d-today)/86400000);
    html+=`<div class="mcell ${out?'out':''} ${isToday?'today':''}" onclick="openDay(${off})">
      <div class="dn ${dnCls}">${d.getDate()}</div>${holLabel}${chips}${more}</div>`;
  }
  html+="</div>";
  calBody.innerHTML=html;
}
function renderTimeGrid(nDays){
  const base=calView==="week"?startOfWeek(calAnchor):new Date(calAnchor);
  const days=[];for(let i=0;i<nDays;i++){const d=new Date(base);d.setDate(base.getDate()+i);days.push(d);}
  calTitle.textContent=`${days[0].getMonth()+1}/${days[0].getDate()} – ${days[nDays-1].getMonth()+1}/${days[nDays-1].getDate()}`;
  const evs=eventsForRole();
  const cols=`52px repeat(${nDays},1fr)`;
  // ヘッダー（祝日は赤）
  let head=`<div class="tg-head" style="grid-template-columns:${cols}"><div class="corner"></div>`;
  days.forEach(d=>{const t=sameDay(d,today);const wd=d.getDay();const hn=holidayName(d);
    const wdCls=(hn||wd===0)?'sun':wd===6?'sat':'';
    head+=`<div class="dh ${t?'today':''} ${hn?'hol':''}"><div class="wd ${wdCls}">${WD[wd]}</div><div class="dd">${d.getDate()}</div></div>`;});
  head+="</div>";
  // 終日（祝日名）行 — Googleカレンダー風
  let allday=`<div class="tg-allday" style="grid-template-columns:${cols}"><div class="ad-label">終日</div>`;
  days.forEach(d=>{const hn=holidayName(d);allday+=`<div class="ad-cell">${hn?`<div class="ad-hol">${hn}</div>`:""}</div>`;});
  allday+="</div>";
  // 本体
  const colH=(EH-SH)*HH;
  let gutter=`<div class="tg-gutter" style="height:${colH}px">`;
  for(let h=SH;h<EH;h++)gutter+=`<div class="hl">${h}:00</div>`;
  gutter+="</div>";
  const now=new Date(); const nowH=now.getHours()+now.getMinutes()/60;
  let cells="";
  days.forEach(d=>{
    const dayEvs=evs.filter(e=>sameDay(e.date,d));
    let blocks="";
    dayEvs.forEach(e=>{
      const top=(e.sh-SH)*HH, h=Math.max((e.eh-e.sh)*HH,22);
      blocks+=`<div class="ev ${evClass(e)}" style="top:${top}px;height:${h}px" onclick="openEvent('${e.id}')">
        <div class="et">${evLabel(e)}</div><div class="es">${fmtH(e.sh)}–${fmtH(e.eh)}</div></div>`;
    });
    if(sameDay(d,today)&&nowH>=SH&&nowH<=EH) blocks+=`<div class="nowline" style="top:${(nowH-SH)*HH}px"></div>`;
    cells+=`<div class="tg-col" style="height:${colH}px">${blocks}</div>`;
  });
  calBody.innerHTML=`<div class="tg-wrap">${head}${allday}<div class="tg-body"><div class="tg-grid" style="grid-template-columns:${cols}">${gutter}${cells}</div></div></div>`;
  // 現在時刻（営業時間内）あたりまでスクロール
  const tb=calBody.querySelector('.tg-body');
  if(tb){const f=Math.min(Math.max(isFinite(nowH)?nowH:9,SH),EH);tb.scrollTop=Math.max(0,(f-SH)*HH-60);}
}

/* ---------- 詳細モーダル ---------- */
function openEvent(id){
  const e=eventById(id);if(!e)return;
  const dstr=`${e.date.getMonth()+1}月${e.date.getDate()}日（${WD[e.date.getDay()]}）`;
  let body;
  if(e.type==="booking"){
    const showMoney=current!=="worker";
    body=`<h3>予約の詳細</h3><p class="lead">${e.room}</p>
      <div class="dl"><span class="k">日付</span><span class="v">${dstr}</span></div>
      <div class="dl"><span class="k">時間</span><span class="v">${fmtH(e.sh)}–${fmtH(e.eh)}</span></div>
      <div class="dl"><span class="k">部屋</span><span class="v">${e.room}</span></div>
      <div class="dl"><span class="k">顧客</span><span class="v">${e.cust}</span></div>
      <div class="dl"><span class="k">受付</span><span class="v">${e.ch==="web"?"Web予約":"店頭受付"}</span></div>
      ${showMoney?`<div class="dl"><span class="k">料金</span><span class="v">${yen(e.amount)}</span></div>
      <div class="dl"><span class="k">決済(Square)</span><span class="v">${e.pay==="paid"?"✅ 事前決済済":"🟠 店頭精算 予定"}</span></div>`:""}`;
  }else{
    const stj=e.st==="done"?"完了":e.st==="doing"?"進行中":"未着手";
    body=`<h3>作業の詳細</h3><p class="lead">${e.title}</p>
      <div class="dl"><span class="k">日付</span><span class="v">${dstr}</span></div>
      <div class="dl"><span class="k">時間</span><span class="v">${fmtH(e.sh)}–${fmtH(e.eh)}</span></div>
      <div class="dl"><span class="k">対象</span><span class="v">${e.room}</span></div>
      <div class="dl"><span class="k">担当</span><span class="v">${e.who}</span></div>
      <div class="dl"><span class="k">状態</span><span class="v">${stj}</span></div>
      <div class="dl"><span class="k">進捗</span><span class="v">${e.prog}%</span></div>`;
  }
  showDetail(body);
}
function openDay(off){
  const d=dateOf(off);
  const dstr=`${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;
  const evs=eventsForRole().filter(e=>sameDay(e.date,d)).sort((a,b)=>a.sh-b.sh);
  const list=evs.length?evs.map(e=>{
    const label=e.type==="booking"?`${e.room}・${e.cust}`:e.title;
    const badge=e.type==="booking"?(e.pay==="paid"?`<span class="badge b-paid">決済済</span>`:`<span class="badge b-unpaid">店頭精算</span>`):`<span class="badge ${e.st==='done'?'b-done':e.st==='doing'?'b-doing':'b-todo'}">${e.st==='done'?'完了':e.st==='doing'?'進行中':'未着手'}</span>`;
    return `<div class="item" style="cursor:pointer" onclick="openEvent('${e.id}')"><div class="row"><div class="t">${fmtH(e.sh)}–${fmtH(e.eh)}　${label}</div>${badge}</div></div>`;
  }).join(""):`<p class="lead">この日の予定はありません。</p>`;
  showDetail(`<h3>${dstr}</h3><p class="lead">${evs.length}件の予定</p>${list}`);
}
function showDetail(inner){
  document.getElementById('detailBox').innerHTML=inner+`<button class="closeb" onclick="closeDetail()">閉じる</button>`;
  document.getElementById('detail').classList.add('show');
}
function closeDetail(){document.getElementById('detail').classList.remove('show');}

/* ---------- 操作 ---------- */
function go(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelector('.content').scrollTop=0;
}
function login(role){
  current=role;
  document.getElementById('login').classList.remove('show');
  render();
  go('s-home',document.querySelector('#nav button[data-screen="s-home"]'));
}
function openLogin(){document.getElementById('login').classList.add('show');}

/* テーマ切替（ライト=Googleカレンダー風 / ダーク） */
function toggleTheme(){
  const isLight=document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
  try{localStorage.setItem('ap2theme',isLight?'light':'dark');}catch(e){}
}
function initTheme(){
  let pref='light';
  try{pref=localStorage.getItem('ap2theme')||'light';}catch(e){}
  document.body.classList.toggle('light',pref==='light');
  document.getElementById('themeBtn').textContent=pref==='light'?'🌙':'☀️';
}

/* init */
initTheme();
buildEvents();
setView('month');
</script>
</body>
</html>
