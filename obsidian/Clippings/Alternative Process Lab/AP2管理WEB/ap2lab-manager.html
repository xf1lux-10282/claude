<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light dark">
<title>Ap2lab 社内管理（叩き台）</title>
<style>
  /* ===== Light（Googleカレンダー風）= 既定 ===== */
  :root{
    --bg:#f8f9fa; --card:#ffffff; --card2:#f1f3f4; --line:#dadce0;
    --text:#202124; --sub:#5f6368; --accent:#1a73e8; --accent2:#188038;
    --warn:#e8710a; --danger:#d93025; --purple:#8430ce;
    --holiday-bg:rgba(217,48,37,.07);
    --ev-blue:#1a73e8; --ev-green:#33a852; --ev-amber:#f9ab00; --ev-purple:#8430ce; --ev-event:#0b8aa0;
    --radius:14px; --headerH:58px; --sideW:220px;
  }
  /* ===== Dark = 端末がダーク設定のとき自動適用 ===== */
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1116; --card:#171c24; --card2:#1f2630; --line:#2a3340;
      --text:#e7edf5; --sub:#9aa7b8; --accent:#8ab4f8; --accent2:#81c995;
      --warn:#fdd663; --danger:#f28b82; --purple:#c58af9;
      --holiday-bg:rgba(242,139,130,.12);
    }
    .badge{background:rgba(255,255,255,.08)}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Roboto",sans-serif;}
  .app{min-height:100vh;display:flex;flex-direction:column}
  .topbar{height:var(--headerH);padding:0 18px;display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40}
  .brand{font-weight:800;letter-spacing:.3px;font-size:17px;line-height:1.1}
  .brand small{color:var(--sub);font-weight:600;font-size:11px;display:block;letter-spacing:1px}
  .who{display:flex;align-items:center;gap:8px;font-size:12px}
  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;background:var(--accent)}
  .role-pill{font-size:10px;color:var(--sub)}
  .switch-btn{font-size:11px;color:var(--accent);background:none;border:1px solid var(--line);padding:5px 10px;border-radius:999px;cursor:pointer}
  .body{flex:1;display:flex;min-height:0}
  .nav{display:flex}
  .nav button{background:none;border:none;color:var(--sub);cursor:pointer;display:flex;align-items:center}
  .nav button .ic{line-height:1}
  .nav button.active{color:var(--accent)}
  .content{flex:1;overflow-y:auto;padding:16px}
  .screen{display:none;animation:fade .25s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.sec{font-size:13px;color:var(--sub);margin:18px 4px 10px;letter-spacing:.5px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .kpi .label{font-size:11px;color:var(--sub)}
  .kpi .val{font-size:24px;font-weight:800;margin-top:6px}
  .kpi .delta{font-size:11px;margin-top:4px}
  .up{color:var(--accent2)} .down{color:var(--danger)}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;background:rgba(60,64,67,.08)}
  .b-paid,.b-done{color:var(--accent2)}
  .b-unpaid{color:var(--warn)}
  .b-web,.b-doing{color:var(--accent)}
  .b-store,.b-todo{color:var(--sub)}
  .item{padding:13px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item .t{font-weight:700;font-size:15px}
  .item .m{color:var(--sub);font-size:12px;margin-top:3px}
  .pbar{height:7px;border-radius:999px;background:var(--card2);overflow:hidden;margin-top:9px}
  .pbar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .tag{display:inline-block;font-size:11px;color:var(--sub);background:var(--card2);padding:3px 9px;border-radius:8px;margin:2px 4px 2px 0}
  .lock{margin-top:8px;padding:14px;border:1px dashed var(--line);border-radius:12px;color:var(--sub);font-size:12px;text-align:center;background:var(--card2)}
  .avatar-sm{width:24px;height:24px;border-radius:50%;display:inline-grid;place-items:center;font-size:10px;font-weight:700;color:#fff;background:#9aa0a6}
  .sq{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .sq b{color:var(--text)}
  .link{color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px}

  /* ===== Calendar ===== */
  .cal-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:12px 0}
  .cal-nav{display:flex;align-items:center;gap:6px}
  .cal-nav button{background:var(--card);border:1px solid var(--line);color:var(--text);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;display:grid;place-items:center}
  .cal-today{width:auto!important;padding:0 12px;font-size:13px!important;font-weight:700}
  .cal-title{font-size:18px;font-weight:800;min-width:130px}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--sub);padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff}
  /* month (Google風 連続グリッド) */
  .mhead{display:grid;grid-template-columns:repeat(7,1fr)}
  .mhead div{text-align:center;font-size:11px;color:var(--sub);padding:6px 0 4px}
  .mgrid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--line);border-left:1px solid var(--line);border-radius:0 0 8px 8px;overflow:hidden}
  .mcell{min-height:94px;background:var(--card);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:4px 4px 6px;cursor:pointer;overflow:hidden}
  .mcell:hover{background:var(--card2)}
  .mcell.out{background:var(--bg);color:var(--sub)}
  .mcell.hol{background:var(--holiday-bg)}
  .mcell .dn{font-size:12px;font-weight:600;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
  .mcell.today .dn{background:var(--accent);color:#fff;border-radius:50%}
  .sun{color:var(--danger)} .sat{color:var(--accent)}
  .hol{color:var(--danger)}
  .holname{font-size:9px;color:var(--danger);font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text);padding:1px 2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-radius:4px}
  .chip:hover{background:var(--card2)}
  .chip .dot{width:8px;height:8px;border-radius:50%;flex:none;background:var(--ev-blue)}
  .chip.paid .dot{background:var(--ev-green)} .chip.unpaid .dot{background:var(--ev-amber)} .chip.task .dot{background:var(--ev-purple)} .chip.event .dot{background:var(--ev-event)}
  .more{font-size:10px;color:var(--sub);padding-left:3px}
  /* time grid (week / 3day) */
  .tg-wrap{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
  .tg-head{display:grid;border-bottom:1px solid var(--line)}
  .tg-head .dh{text-align:center;padding:6px 2px 8px;border-left:1px solid var(--line)}
  .tg-head .dh .wd{font-size:11px;color:var(--sub)}
  .tg-head .dh.hol .wd,.tg-head .dh .wd.sun{color:var(--danger)} .tg-head .dh .wd.sat{color:var(--accent)}
  .tg-head .dh .dd{font-size:18px;font-weight:700;margin-top:2px}
  .tg-head .dh.hol .dd{color:var(--danger)}
  .tg-head .dh.today .dd{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
  .tg-allday{display:grid;border-bottom:1px solid var(--line);min-height:24px;background:var(--card)}
  .tg-allday .ad-label{font-size:9px;color:var(--sub);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
  .tg-allday .ad-cell{border-left:1px solid var(--line);padding:3px}
  .ad-hol{font-size:10px;color:var(--danger);background:var(--holiday-bg);border-radius:5px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
  .tg-body{max-height:60vh;overflow-y:auto;position:relative}
  .tg-grid{display:grid;position:relative}
  .tg-gutter{position:relative}
  .tg-gutter .hl{height:46px;font-size:10px;color:var(--sub);text-align:right;padding-right:6px;transform:translateY(-6px)}
  .tg-col{position:relative;border-left:1px solid var(--line);
    background-image:repeating-linear-gradient(to bottom,var(--line) 0,var(--line) 1px,transparent 1px,transparent 46px)}
  .tg-col.holcol{background-color:var(--holiday-bg)}
  .ev{position:absolute;left:3px;right:3px;border-radius:6px;padding:3px 6px;font-size:11px;overflow:hidden;cursor:pointer;background:var(--ev-blue);color:#fff;line-height:1.25}
  .ev.paid{background:var(--ev-green)} .ev.unpaid{background:var(--ev-amber);color:#3c4043} .ev.task{background:var(--ev-purple)} .ev.event{background:var(--ev-event)}
  .ev .et{font-weight:700} .ev .es{opacity:.9;font-size:10px}
  .nowline{position:absolute;left:0;right:0;height:2px;background:#ea4335;z-index:5}
  .nowline::before{content:"";position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#ea4335}

  /* ===== Customers ===== */
  .cust-bar{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:8px}
  .sortb{background:var(--card);border:1px solid var(--line);color:var(--text);padding:7px 12px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
  .cust-sec-h{position:sticky;top:0;background:var(--bg);color:var(--accent);font-weight:800;font-size:13px;padding:7px 4px;border-bottom:1px solid var(--line);z-index:5}
  .crow{padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:12px}
  .crow:hover{background:var(--card2)}
  .crow .ci{width:34px;height:34px;border-radius:50%;background:var(--card2);display:grid;place-items:center;font-weight:700;font-size:14px;color:var(--sub);flex:none}
  .crow .cn{font-weight:700;font-size:15px}
  .crow .cm{font-size:12px;color:var(--sub);margin-top:2px}
  .cbk{font-size:11.5px;color:var(--accent);margin-top:4px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .kind{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(11,138,160,.16);color:var(--ev-event)}
  .cust-index{position:fixed;right:2px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:0;z-index:25}
  .cust-index button{background:none;border:none;color:var(--accent);font-size:10px;line-height:1.15;padding:1px 4px;cursor:pointer;font-weight:700}
  .cust-index button:disabled{color:var(--sub);opacity:.3;cursor:default}

  /* ===== 経営ダッシュボード ===== */
  .fy-bar{display:flex;align-items:center;gap:10px;margin:4px 0 14px}
  .fy-bar .cal-nav button{width:32px;height:32px}
  .fy-title{font-weight:800;font-size:16px}
  .btab{width:100%;border-collapse:collapse;font-size:13px}
  .btab th,.btab td{padding:7px 6px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  .btab th{color:var(--sub);font-weight:600;font-size:11px}
  .btab td:first-child,.btab th:first-child{text-align:left}
  .btab tr.total td{font-weight:800;border-top:2px solid var(--line);border-bottom:none}
  .btab tr.mrow{cursor:pointer} .btab tr.mrow:hover td{background:var(--card2)}
  .pos{color:var(--accent2)} .neg{color:var(--danger)}
  .barchart{display:flex;align-items:flex-end;gap:4px;height:130px;padding-top:6px}
  .bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;cursor:pointer}
  .bc .bwrap{width:100%;max-width:24px;height:100%;display:flex;align-items:flex-end}
  .bc .bar{width:100%;border-radius:4px 4px 0 0;background:var(--accent);min-height:2px}
  .bc:hover .bar{filter:brightness(1.1)}
  .bc .lb{font-size:9px;color:var(--sub)}
  .comp{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .comp:last-child{border-bottom:none}
  .comp .cdot{width:11px;height:11px;border-radius:3px;flex:none}
  .comp .clab{flex:1;font-weight:600}
  .comp .cval{font-weight:700;text-align:right;min-width:78px}
  .comp .cpct{color:var(--sub);font-size:11px;min-width:38px;text-align:right}
  .compbar{height:8px;border-radius:999px;background:var(--card2);overflow:hidden;margin-top:7px}
  .compbar>i{display:block;height:100%}
  .inp{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 9px;font-size:13px}
  .inp.num{text-align:right;width:120px}
  .frow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .frow:last-child{border-bottom:none}
  .vform{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .vform .inp{flex:1;min-width:90px}
  .addbtn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer}
  .vrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .vrow:last-child{border-bottom:none}
  .vrow .vx{margin-left:auto;color:var(--danger);cursor:pointer;border:none;background:none;font-size:16px;line-height:1}
  .vrow .vym{color:var(--sub);font-size:11px;min-width:42px}

  /* overlay / modal */
  .overlay{position:fixed;inset:0;background:rgba(20,22,28,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .overlay.show{display:flex}
  .overlay .box{max-width:430px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.25)}
  .overlay h3{margin:0 0 4px;font-size:18px}
  .overlay p.lead{color:var(--sub);font-size:12px;margin:0 0 18px}
  .role-btn{width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.15s}
  .role-btn:hover{border-color:var(--accent)}
  .role-btn .d{font-size:11px;color:var(--sub);margin-top:2px}
  .note{font-size:11px;color:var(--sub);line-height:1.6;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:14px}
  .dl{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
  .dl:last-child{border-bottom:none}
  .dl .k{color:var(--sub)} .dl .v{font-weight:700;text-align:right}
  .closeb{margin-top:16px;width:100%;background:var(--card2);border:1px solid var(--line);color:var(--text);padding:12px;border-radius:12px;font-weight:700;cursor:pointer}

  /* ===== Responsive: mobile (default) ===== */
  .nav{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);justify-content:space-around;padding:8px 4px 14px;z-index:30}
  .nav button{flex-direction:column;gap:3px;font-size:10px;flex:1;padding:4px}
  .nav button .ic{font-size:20px}
  .content{padding-bottom:90px}
  /* ===== Responsive: desktop ===== */
  @media (min-width:900px){
    .nav{position:sticky;top:var(--headerH);align-self:flex-start;height:calc(100vh - var(--headerH));width:var(--sideW);
      flex-direction:column;justify-content:flex-start;gap:4px;padding:16px 10px;border-top:none;border-right:1px solid var(--line)}
    .nav button{flex:none;width:100%;flex-direction:row;justify-content:flex-start;gap:12px;font-size:14px;padding:11px 14px;border-radius:10px}
    .nav button.active{background:rgba(26,115,232,.12)}
    .nav button .ic{font-size:18px;width:22px;text-align:center}
    .content{padding:24px 28px 40px;max-width:1120px;margin:0 auto;width:100%}
    .mcell{min-height:112px}
    .tg-body{max-height:64vh}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">Ap2lab<small>暗室ルーム 社内管理</small></div>
    <div class="who">
      <div style="text-align:right"><div id="whoName" style="font-weight:700">—</div><div class="role-pill" id="whoRole">—</div></div>
      <div class="avatar" id="whoAv">A</div>
      <button class="switch-btn" onclick="openLogin()">切替</button>
    </div>
  </header>

  <div class="body">
    <nav class="nav" id="nav">
      <button data-screen="s-home" class="active" onclick="go('s-home',this)"><span class="ic">🏠</span><span>ホーム</span></button>
      <button data-screen="s-book" onclick="go('s-book',this)"><span class="ic">📅</span><span>カレンダー</span></button>
      <button data-screen="s-task" onclick="go('s-task',this)"><span class="ic">✅</span><span>作業</span></button>
      <button data-screen="s-cust" onclick="go('s-cust',this)"><span class="ic">👥</span><span>顧客</span></button>
      <button data-screen="s-biz" onclick="go('s-biz',this)"><span class="ic">📊</span><span>経営</span></button>
    </nav>

    <main class="content">
      <section class="screen active" id="s-home">
        <h2 class="sec">今日の状況</h2>
        <div class="kpi-grid" id="homeKpi"></div>
        <h2 class="sec">本日の予約</h2>
        <div class="card" id="homeBookings"></div>
        <h2 class="sec">あなたのタスク</h2>
        <div class="card" id="homeTasks"></div>
      </section>

      <section class="screen" id="s-book">
        <div class="sq">🟦 <span><b>Square予約</b> と連携：部屋料金は予約時に事前決済／店頭受付分は当日精算</span></div>
        <div class="cal-bar">
          <div class="cal-nav">
            <button onclick="calToday()" class="cal-today">今日</button>
            <button onclick="calMove(-1)">‹</button>
            <button onclick="calMove(1)">›</button>
            <span class="cal-title" id="calTitle"></span>
          </div>
          <div class="seg" id="calSeg">
            <button data-v="month" onclick="setView('month')">月</button>
            <button data-v="week" onclick="setView('week')">週</button>
            <button data-v="3day" onclick="setView('3day')">3日</button>
          </div>
        </div>
        <div id="calBody"></div>
        <h2 class="sec" id="evHead">ワークショップ・セミナー</h2>
        <div class="card" id="eventList"></div>
      </section>

      <section class="screen" id="s-task">
        <h2 class="sec">作業・進捗</h2>
        <div class="card" id="taskList"></div>
      </section>

      <section class="screen" id="s-cust">
        <div class="cust-bar">
          <button class="sortb" id="sortBtn" onclick="toggleSort()">▲ 昇順（あ→わ）</button>
        </div>
        <div id="custList"></div>
        <div class="cust-index" id="custIndex"></div>
      </section>

      <section class="screen" id="s-biz">
        <h2 class="sec">経営ダッシュボード</h2>
        <div id="bizBody"></div>
      </section>
    </main>
  </div>
</div>

<!-- LOGIN -->
<div class="overlay show" id="login">
  <div class="box">
    <h3>ログイン</h3>
    <p class="lead">※叩き台では「誰としてログインするか」を選ぶと、その人に見える画面だけが表示されます（＝権限分けの体感）。</p>
    <button class="role-btn" onclick="login('owner')"><span class="avatar" style="background:#8b5cf6">大</span><div><div style="font-weight:700">あなた（オーナー）</div><div class="d">全権限・経営数値まで全部</div></div></button>

function kanaIndex(yomi){

}

function bizCompute(fy){
  const months=monthsOfFY(fy), sales=genSales(fy), resv=genResv(fy);
  const monSales=sales.map(s=>s.ws+s.seminar+s.event+s.rental+s.goods);
  const monVar=months.map(mo=>VARCOSTS.filter(v=>v.ym===mo.ym).reduce((a,v)=>a+(+v.amount||0),0));
  const fixedMon=(+FIXED.rent||0)+(+FIXED.net||0);
  const monExp=months.map((mo,i)=>fixedMon+monVar[i]);
  const monGross=months.map((mo,i)=>monSales[i]-monExp[i]);
  return {months,sales,resv,monSales,monVar,fixedMon,monExp,monGross};
}

      <div class="kpi"><div class="label">年間売上</div><div class="val">${yen(annSales)}</div></div>

      <div class="kpi"><div class="label">年間粗利益</div><div class="val ${annGross>=0?'pos':'neg'}">${yen(annGross)}</div></div>

  h+=`<tr class="total"><td>年間計</td><td>${yen(annSales)}</td><td>${yen(annExp)}</td><td class="${annGross>=0?'pos':'neg'}">${yen(annGross)}</td></tr></table></div>`;

  // 売上構成比
  h+=`<h2 class="sec">売上構成比（年間）</h2><div class="card">`;
  SALES_CATS.forEach(c=>{const v=catAnn[c[0]], pct=annSales?Math.round(v/annSales*100):0;
    h+=`<div><div class="comp"><span class="cdot" style="background:${c[2]}"></span><span class="clab">${c[1]}</span><span class="cval">${yen(v)}</span><span class="cpct">${pct}%</span></div>
    <div class="compbar"><i style="width:${pct}%;background:${c[2]}"></i></div></div>`;});
  h+=`</div>`;

  // 予約数構成
  h+=`<h2 class="sec">予約数の構成（年間 計${resvTotal}件）</h2><div class="card">`;
  RESV_CATS.forEach(c=>{const v=resvAnn[c[0]], pct=Math.round(v/resvTotal*100);
    h+=`<div><div class="comp"><span class="cdot" style="background:${c[2]}"></span><span class="clab">${c[1]}</span><span class="cval">${v}件</span><span class="cpct">${pct}%</span></div>
    <div class="compbar"><i style="width:${pct}%;background:${c[2]}"></i></div></div>`;});
  h+=`</div>`;

  // 固定費
  h+=`<h2 class="sec">固定費（毎月）</h2><div class="card">
    <div class="frow"><div>家賃</div><div><input class="inp num" type="number" value="${FIXED.rent}" onchange="setFixed('rent',this.value)"> 円/月</div></div>
    <div class="frow"><div>ネット回線</div><div><input class="inp num" type="number" value="${FIXED.net}" onchange="setFixed('net',this.value)"> 円/月</div></div>
    <div class="frow"><div style="font-weight:800">固定費 月合計</div><div style="font-weight:800">${yen(C.fixedMon)}／月　（年間 ${yen(annFixed)}）</div></div></div>`;

  // 変動費（手動入力）
  const monthOpts=C.months.map(mo=>`<option value="${mo.ym}">${mo.y}/${String(mo.m).padStart(2,'0')}</option>`).join("");
  let vlist=""; let anyVar=false;
  VARCOSTS.forEach((v,idx)=>{ if(C.months.some(mo=>mo.ym===v.ym)){ anyVar=true;
    vlist+=`<div class="vrow"><span class="vym">${v.ym.slice(5)}月</span><span style="flex:1">${v.label}</span><span style="font-weight:700">${yen(+v.amount||0)}</span><button class="vx" onclick="delVar(${idx})">✕</button></div>`;}});
  if(!anyVar)vlist=`<p class="lead" style="margin:6px 0 0">この年度の変動費はまだありません。上で追加してください。</p>`;
  h+=`<h2 class="sec">変動費（手動入力）</h2><div class="card">
    <div class="vform">
      <select class="inp" id="varMonth">${monthOpts}</select>
      <input class="inp" id="varLabel" placeholder="費目（例：光熱費・発注費）">
      <input class="inp num" id="varAmt" type="number" placeholder="金額">
      <button class="addbtn" onclick="addVar()">追加</button>
    </div>${vlist}
    <div class="frow" style="margin-top:6px"><div style="font-weight:800">変動費 年間合計</div><div style="font-weight:800">${yen(annVar)}</div></div></div>`;

  // 粗利まとめ
  h+=`<h2 class="sec">粗利益（年間）</h2><div class="card">
    <div class="frow"><div>売上</div><div style="font-weight:700">${yen(annSales)}</div></div>
    <div class="frow"><div>経費（固定 ${yen(annFixed)} ＋ 変動 ${yen(annVar)}）</div><div style="font-weight:700">− ${yen(annExp)}</div></div>
    <div class="frow"><div style="font-weight:800">粗利益</div><div style="font-weight:800" class="${annGross>=0?'pos':'neg'}">${yen(annGross)}（粗利率 ${grossRate}%）</div></div></div>
    <p class="note">※ 売上・予約数はサンプル値（本番ではSquare／予約データから自動集計）。固定費・変動費の入力はこの端末に保存されます。決算用ではなく、利益感を把握するための簡易表示です。</p>`;

  bizBody.innerHTML=h;
}
function openMonth(i){
  const C=bizCompute(fyStart), mo=C.months[i], s=C.sales[i], r=C.resv[i];
  const salesRows=SALES_CATS.map(c=>`<div class="dl"><span class="k"><span class="cdot" style="background:${c[2]};display:inline-block;margin-right:6px"></span>${c[1]}</span><span class="v">${yen(s[c[0]])}</span></div>`).join("");
  const resvRows=RESV_CATS.map(c=>`<div class="dl"><span class="k">${c[1]}</span><span class="v">${r[c[0]]}件</span></div>`).join("");
  showDetail(`<h3>${mo.y}年${mo.m}月</h3><p class="lead">月次サマリー</p>
    <h2 class="sec" style="margin:6px 0">売上内訳</h2>${salesRows}
    <div class="dl"><span class="k" style="font-weight:800">売上 計</span><span class="v" style="font-weight:800">${yen(C.monSales[i])}</span></div>
    <h2 class="sec" style="margin:14px 0 6px">予約数</h2>${resvRows}
    <h2 class="sec" style="margin:14px 0 6px">損益</h2>
    <div class="dl"><span class="k">経費（固定${yen(C.fixedMon)}＋変動${yen(C.monVar[i])}）</span><span class="v">${yen(C.monExp[i])}</span></div>
    <div class="dl"><span class="k" style="font-weight:800">粗利益</span><span class="v ${C.monGross[i]>=0?'pos':'neg'}" style="font-weight:800">${yen(C.monGross[i])}</span></div>`);
}

/* ---------- カレンダー ---------- */
function setView(v){calView=v;document.querySelectorAll('#calSeg button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));renderCalendar();}
function calToday(){calAnchor=new Date(today);renderCalendar();}
function calMove(dir){const x=new Date(calAnchor);if(calView==="month")x.setMonth(x.getMonth()+dir);else if(calView==="week")x.setDate(x.getDate()+7*dir);else x.setDate(x.getDate()+3*dir);calAnchor=x;renderCalendar();}
function evClass(e){return e.type==="event"?"event":e.type==="task"?"task":(e.pay==="paid"?"paid":"unpaid");}
function evLabel(e){return e.type==="booking"?`${e.room}・${e.cust}`:e.title;}

function renderCalendar(){
  if(!PERMS[current].includes("s-book"))return;
  if(calView==="month")renderMonth(); else renderTimeGrid(calView==="week"?7:3);
  renderEventList();
}
function renderEventList(){
  const show=["owner","admin","reception"].includes(current);
  document.getElementById('evHead').style.display=show?'':'none';
  document.getElementById('eventList').style.display=show?'':'none';
  if(!show)return;
  const evs=EVENTS.filter(e=>e.type==="event").sort((a,b)=>a.date-b.date||a.sh-b.sh);
  eventList.innerHTML=evs.map(e=>{
    const d=e.date, ds=`${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）`;
    const full=e.participants.length>=e.cap;
    return `<div class="item" style="cursor:pointer" onclick="openEvent('${e.id}')">
      <div class="row"><div class="t">${e.title}</div><span class="kind">${e.kind}</span></div>
      <div class="m">📅 ${ds} ${fmtH(e.sh)}–${fmtH(e.eh)}　@${e.room}</div>
      <div class="m">👥 参加 ${e.participants.length}/${e.cap}名${full?'（満席）':''}　・　${yen(e.fee)}</div></div>`;
  }).join("");
}
function renderMonth(){
  const y=calAnchor.getFullYear(), m=calAnchor.getMonth();
  calTitle.textContent=`${y}年${m+1}月`;
  const first=new Date(y,m,1), start=startOfWeek(first);
  const evs=eventsForRole();
  let html=`<div class="mhead">${WD.map((w,i)=>`<div class="${i===0?'sun':i===6?'sat':''}">${w}</div>`).join("")}</div><div class="mgrid">`;
  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const out=d.getMonth()!==m, isToday=sameDay(d,today), hn=holidayName(d);
    const dayEvs=evs.filter(e=>sameDay(e.date,d)).sort((a,b)=>a.sh-b.sh);
    const limit=hn?2:3;
    const chips=dayEvs.slice(0,limit).map(e=>`<div class="chip ${evClass(e)}" onclick="event.stopPropagation();openEvent('${e.id}')"><span class="dot"></span>${fmtH(e.sh)} ${evLabel(e)}</div>`).join("");
    const more=dayEvs.length>limit?`<div class="more">＋${dayEvs.length-limit}件</div>`:"";
    const dnCls=(hn||d.getDay()===0)?'sun':d.getDay()===6?'sat':'';
    const off=Math.round((d-today)/86400000);
    html+=`<div class="mcell ${out?'out':''} ${isToday?'today':''} ${hn?'hol':''}" onclick="openDay(${off})">
      <div class="dn ${dnCls}">${d.getDate()}</div>${hn?`<div class="holname">${hn}</div>`:""}${chips}${more}</div>`;
  }
  html+="</div>";
  calBody.innerHTML=html;
}
function renderTimeGrid(nDays){
  const base=calView==="week"?startOfWeek(calAnchor):new Date(calAnchor);
  const days=[];for(let i=0;i<nDays;i++){const d=new Date(base);d.setDate(base.getDate()+i);days.push(d);}
  calTitle.textContent=`${days[0].getMonth()+1}/${days[0].getDate()} – ${days[nDays-1].getMonth()+1}/${days[nDays-1].getDate()}`;
  const evs=eventsForRole();
  const cols=`52px repeat(${nDays},1fr)`;
  let head=`<div class="tg-head" style="grid-template-columns:${cols}"><div></div>`;
  days.forEach(d=>{const t=sameDay(d,today),wd=d.getDay(),hn=holidayName(d);const wdCls=(hn||wd===0)?'sun':wd===6?'sat':'';
    head+=`<div class="dh ${t?'today':''} ${hn?'hol':''}"><div class="wd ${wdCls}">${WD[wd]}</div><div class="dd">${d.getDate()}</div></div>`;});
  head+="</div>";
  let allday=`<div class="tg-allday" style="grid-template-columns:${cols}"><div class="ad-label">終日</div>`;
  days.forEach(d=>{const hn=holidayName(d);allday+=`<div class="ad-cell">${hn?`<div class="ad-hol">${hn}</div>`:""}</div>`;});
  allday+="</div>";
  const colH=(EH-SH)*HH;
  let gutter=`<div class="tg-gutter" style="height:${colH}px">`;
  for(let h=SH;h<EH;h++)gutter+=`<div class="hl">${h}:00</div>`;
  gutter+="</div>";
  const now=new Date(), nowH=now.getHours()+now.getMinutes()/60;
  let cells="";
  days.forEach(d=>{
    const dayEvs=evs.filter(e=>sameDay(e.date,d)), hn=holidayName(d);
    let blocks="";
    dayEvs.forEach(e=>{const top=(e.sh-SH)*HH,h=Math.max((e.eh-e.sh)*HH,22);
      blocks+=`<div class="ev ${evClass(e)}" style="top:${top}px;height:${h}px" onclick="openEvent('${e.id}')"><div class="et">${evLabel(e)}</div><div class="es">${fmtH(e.sh)}–${fmtH(e.eh)}</div></div>`;});
    if(sameDay(d,today)&&nowH>=SH&&nowH<=EH)blocks+=`<div class="nowline" style="top:${(nowH-SH)*HH}px"></div>`;
    cells+=`<div class="tg-col ${hn?'holcol':''}" style="height:${colH}px">${blocks}</div>`;
  });
  calBody.innerHTML=`<div class="tg-wrap">${head}${allday}<div class="tg-body"><div class="tg-grid" style="grid-template-columns:${cols}">${gutter}${cells}</div></div></div>`;
  const tb=calBody.querySelector('.tg-body');
  if(tb){const f=Math.min(Math.max(isFinite(nowH)?nowH:9,SH),EH);tb.scrollTop=Math.max(0,(f-SH)*HH-60);}
}

/* ---------- 顧客リスト ---------- */
function toggleSort(){custSortAsc=!custSortAsc;
  document.getElementById('sortBtn').textContent=custSortAsc?"▲ 昇順（あ→わ）":"▼ 降順（わ→あ）";
  renderCustomers();
}
function renderCustomers(){
  if(!["owner","admin","reception"].includes(current)){custList.innerHTML="";custIndex.innerHTML="";return;}
  const groups={};
  CUSTOMERS.forEach(c=>{const g=kanaIndex(c.yomi);(groups[g]=groups[g]||[]).push(c);});
  const dir=custSortAsc?1:-1;
  let order=INDEX_ORDER.filter(g=>groups[g]);
  if(!custSortAsc)order=order.slice().reverse();
  let html="";
  order.forEach(g=>{
    const items=groups[g].slice().sort((a,b)=>(a.yomi<b.yomi?-1:a.yomi>b.yomi?1:0)*dir);
    html+=`<div class="cust-sec-h" id="sec-${g}">${g}</div>`;
    items.forEach(c=>{
      const bks=BOOKINGS.map((b,i)=>({b,i})).filter(o=>o.b.cust===c.n);
      const up=bks.filter(o=>o.b.day>=0).sort((a,b)=>a.b.day-b.b.day);
      let bline="";
      if(up.length){const b=up[0].b,d=dateOf(b.day);
        bline=`<div class="cbk">📅 次回 ${d.getMonth()+1}/${d.getDate()} ${fmtH(b.sh)} ${b.room}${up.length>1?`　＋他${up.length-1}件`:''}</div>`;}
      else if(bks.length){bline=`<div class="cbk" style="color:var(--sub)">予約 ${bks.length}件（過去）</div>`;}
      html+=`<div class="crow" onclick="openCustomer('${c.n}')">
        <div class="ci">${c.n.charAt(0)}</div>
        <div style="flex:1"><div class="cn">${c.n}</div><div class="cm">${c.yomi}・来店 ${c.visits}回</div>${bline}</div>
        <div class="m">›</div></div>`;});
  });
  custList.innerHTML=html;
  custIndex.innerHTML=INDEX_ORDER.map(g=>groups[g]
    ?`<button onclick="jumpTo('${g}')">${g}</button>`
    :`<button disabled>${g}</button>`).join("");
}
function jumpTo(g){const el=document.getElementById('sec-'+g);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}

/* ---------- 詳細モーダル ---------- */
function openEvent(id){

  let body;
  if(e.type==="booking"){
    const showMoney=current!=="worker";
    body=`<h3>予約の詳細</h3><p class="lead">${e.room}</p>
      <div class="dl"><span class="k">日付</span><span class="v">${dstr}</span></div>
      <div class="dl"><span class="k">時間</span><span class="v">${fmtH(e.sh)}–${fmtH(e.eh)}</span></div>
      <div class="dl"><span class="k">部屋</span><span class="v">${e.room}</span></div>
      <div class="dl"><span class="k">顧客</span><span class="v"><span class="link" onclick="openCustomer('${e.cust}')">${e.cust}</span></span></div>
      <div class="dl"><span class="k">受付</span><span class="v">${e.ch==="web"?"Web予約":"店頭受付"}</span></div>
      ${showMoney?`<div class="dl"><span class="k">料金</span><span class="v">${yen(e.amount)}</span></div>
      <div class="dl"><span class="k">決済(Square)</span><span class="v">${e.pay==="paid"?"✅ 事前決済済":"🟠 店頭精算 予定"}</span></div>`:""}`;
  }else if(e.type==="event"){
    const plist=e.participants.length
      ? e.participants.map(n=>`<div class="item" style="cursor:pointer" onclick="openCustomer('${n}')"><div class="row"><div class="t">${n}</div><span class="m">›</span></div></div>`).join("")
      : `<p class="lead">参加者はまだいません。</p>`;
    body=`<h3>${e.title}</h3><p class="lead">${e.kind}</p>
      <div class="dl"><span class="k">日付</span><span class="v">${dstr}</span></div>
      <div class="dl"><span class="k">時間</span><span class="v">${fmtH(e.sh)}–${fmtH(e.eh)}</span></div>
      <div class="dl"><span class="k">会場</span><span class="v">${e.room}</span></div>
      <div class="dl"><span class="k">参加費</span><span class="v">${yen(e.fee)}</span></div>
      <div class="dl"><span class="k">参加状況</span><span class="v">${e.participants.length} / ${e.cap}名${e.participants.length>=e.cap?'（満席）':`（残${e.cap-e.participants.length}）`}</span></div>
      <h2 class="sec" style="margin:16px 0 6px">参加者リスト（${e.participants.length}名）</h2>${plist}`;
  }else{
    const stj=e.st==="done"?"完了":e.st==="doing"?"進行中":"未着手";
    body=`<h3>作業の詳細</h3><p class="lead">${e.title}</p>
      <div class="dl"><span class="k">日付</span><span class="v">${dstr}</span></div>
      <div class="dl"><span class="k">時間</span><span class="v">${fmtH(e.sh)}–${fmtH(e.eh)}</span></div>
      <div class="dl"><span class="k">対象</span><span class="v">${e.room}</span></div>
      <div class="dl"><span class="k">担当</span><span class="v">${e.who}</span></div>
      <div class="dl"><span class="k">状態</span><span class="v">${stj}</span></div>
      <div class="dl"><span class="k">進捗</span><span class="v">${e.prog}%</span></div>`;
  }

}
function openDay(off){
  const d=dateOf(off), dstr=`${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`, hn=holidayName(d);
  const evs=eventsForRole().filter(e=>sameDay(e.date,d)).sort((a,b)=>a.sh-b.sh);
  const list=evs.length?evs.map(e=>{
    const label=e.type==="booking"?`${e.room}・${e.cust}`:e.title;
    const badge=e.type==="booking"?(e.pay==="paid"?`<span class="badge b-paid">決済済</span>`:`<span class="badge b-unpaid">店頭精算</span>`):`<span class="badge ${e.st==='done'?'b-done':e.st==='doing'?'b-doing':'b-todo'}">${e.st==='done'?'完了':e.st==='doing'?'進行中':'未着手'}</span>`;
    return `<div class="item" style="cursor:pointer" onclick="openEvent('${e.id}')"><div class="row"><div class="t">${fmtH(e.sh)}–${fmtH(e.eh)}　${label}</div>${badge}</div></div>`;
  }).join(""):`<p class="lead">この日の予定はありません。</p>`;
  showDetail(`<h3>${dstr}</h3>${hn?`<p class="lead" style="color:var(--danger)">🎌 ${hn}</p>`:`<p class="lead">${evs.length}件の予定</p>`}${list}`);
}
function openCustomer(n){
  const c=CUSTOMERS.find(x=>x.n===n);
  if(!c){showDetail(`<h3>${n}</h3><p class="lead">顧客情報が未登録です。</p>`);return;}
  const list=BOOKINGS.map((b,i)=>({b,i})).filter(o=>o.b.cust===n).sort((a,b)=>a.b.day-b.b.day);
  const bRows=list.length?list.map(o=>{const b=o.b,d=dateOf(b.day);
    const badge=b.pay==="paid"?`<span class="badge b-paid">決済済</span>`:`<span class="badge b-unpaid">店頭精算</span>`;
    return `<div class="item" style="cursor:pointer" onclick="openEvent('b${o.i}')"><div class="row"><div class="t">${d.getMonth()+1}/${d.getDate()} ${fmtH(b.sh)}–${fmtH(b.eh)}　${b.room}</div>${badge}</div></div>`;
  }).join(""):`<p class="lead">予約履歴はありません。</p>`;
  const myEv=EVENTS.filter(e=>e.type==="event"&&e.participants.includes(n)).sort((a,b)=>a.date-b.date);
  const evRows=myEv.map(e=>`<div class="item" style="cursor:pointer" onclick="openEvent('${e.id}')"><div class="row"><div class="t">${e.date.getMonth()+1}/${e.date.getDate()}　${e.title}</div><span class="kind">${e.kind}</span></div></div>`).join("");
  const evSec=myEv.length?`<h2 class="sec" style="margin:16px 0 6px">参加イベント（${myEv.length}件）</h2>${evRows}`:"";
  showDetail(`<h3>${c.n}</h3><p class="lead">${c.yomi}・来店 ${c.visits}回</p>
    <div class="dl"><span class="k">電話</span><span class="v">${c.tel}</span></div>
    <div class="dl"><span class="k">メモ</span><span class="v">${c.note}</span></div>
    <h2 class="sec" style="margin:16px 0 6px">予約履歴（${list.length}件）</h2>${bRows}${evSec}`);
}
function showDetail(inner){document.getElementById('detailBox').innerHTML=inner+`<button class="closeb" onclick="closeDetail()">閉じる</button>`;document.getElementById('detail').classList.add('show');}
function closeDetail(){document.getElementById('detail').classList.remove('show');}

/* ---------- 操作 ---------- */
function go(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelector('.content').scrollTop=0;
}
function login(role){current=role;document.getElementById('login').classList.remove('show');render();go('s-home',document.querySelector('#nav button[data-screen="s-home"]'));}
function openLogin(){document.getElementById('login').classList.add('show');}

/* init */
buildEvents();
setView('month');
loadHolidays();
</script>
</body>
</html>
